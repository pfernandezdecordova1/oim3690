<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Dog Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:Arial,Helvetica,sans-serif;background:#000;color:#fff;overflow:hidden;}
    .bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
    .center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
    .center h1{font-size:4rem;margin-bottom:0.5rem;}
    .center p{font-size:1.2rem;margin-bottom:1rem;}
    .center a{color:#10b981;text-decoration:none;font-weight:600;}
  </style>
</head>
<body>
  <img class="bg" src="https://media.betterroaming.com/f/252707/2048x1152/230afd2c7c/blog_image_madrid_vacation.webp" alt="Madrid cityscape">
  <div class="center-wrapper">
    <div class="center">
      <h1>07:24</h1>
      <p><a href="https://github.com" style="color:#10b981;"><i class="fab fa-github"></i></a> &nbsp; | &nbsp; <a href="https://twitter.com" style="color:#93c5fd;"><i class="fab fa-twitter"></i></a></p>

    </div>
  </div>
</body>
</html>
